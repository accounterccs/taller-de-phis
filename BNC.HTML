<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>BNCNET - Login Personas Naturales</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .flex-row { display: flex; gap: 40px; align-items: flex-start; }
        
        /* Login Panel */
        .login-panel { width: 400px; }
        .tabs { display: flex; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 700; background: #dcdcdc; }
        .tab.active { background: white; color: #001C4D; }
        .login-box { background: #001C4D; color: white; padding: 30px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        
        /* Inputs */
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 4px; border: none; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #4A47A3; color: white; border: none; font-weight: 700; cursor: pointer; }
        
        /* Servicios */
        .service-panel { flex: 1; }
        .service-grid { display: flex; gap: 20px; margin-top: 20px; }
        .service-card { background: #001C4D; color: white; border-radius: 8px; padding: 25px; flex: 1; text-align: center; }
        .contact-box { background: #001C4D; color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        
        footer { text-align: center; padding: 25px; font-size: 0.75rem; border-top: 5px solid #FF5000; margin-top: 50px; background: #f4f6f9; }
    </style>
</head>
<body>

<div class="main-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <img src="https://d1uubxdj0phgsa.cloudfront.net/Images/BNCLogoSmall-Big.png" style="width: 120px;">
        <div style="font-weight:700; color:#001C4D;"><i class="fa fa-calendar"></i> MIÉRCOLES, 03/06/2026</div>
    </div>
    
    <div class="flex-row">
        <div class="login-panel">
            <div class="tabs"><div class="tab active">Personas</div><div class="tab">Empresas</div></div>
